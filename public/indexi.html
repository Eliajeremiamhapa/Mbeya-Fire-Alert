<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elixa AI | Text-to-Video</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f111a;
    --card-bg: #1a1d2b;
    --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    --accent-cyan: #22d3ee;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-dark);
    background-image: radial-gradient(circle at top right, #1e1b4b, transparent);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  .container {
    background: var(--card-bg);
    width: 100%;
    max-width: 600px;
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.05);
    text-align: center;
  }

  .brand-name {
    color: var(--accent-cyan);
    font-weight: 800;
    letter-spacing: 2px;
    font-size: 0.9rem;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  h1 { 
    font-size: 2.2rem;
    font-weight: 800;
    margin: 0 0 12px 0;
    background: linear-gradient(to right, #fff, var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.subtitle {
    color: var(--text-dim);
    margin-bottom: 30px;
    font-size: 1rem;
    line-height: 1.5;
  }

  textarea {
    width: 100%;
    height: 100px;
    padding: 18px;
    box-sizing: border-box;
    font-size: 16px;
    background: #0f111a;
    border: 2px solid #2d3142;
    border-radius: 16px;
    color: #fff;
    resize: none;
    transition: all 0.3s ease;
    outline: none;
    margin-bottom: 20px;
  }

  textarea:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: 600;
    background: var(--primary-gradient);
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
  }

  video {
    margin-top: 30px;
    width: 100%;
    border-radius: 16px;
    display: none;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #loading { 
    margin-top: 20px; 
    font-size: 0.9rem;
    color: var(--accent-cyan); 
  }

  .footer-text {
    margin-top: 25px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="container">
  <span class="brand-name">Elixa Software Company</span>
  <h1>Text to Video AI</h1>
  <p class="subtitle">Andika wazo lako hapa chini na Elixa itatengeneza video kwa ajili yako.</p>
  
  <textarea id="prompt" placeholder="Mfano: Simba akitembea kwenye msitu wa kijani..."></textarea>
  
  <button id="generate">Tengeneza Video sasa</button>
  
  <div id="loading"></div>
  <video id="resultVideo" controls></video>

  <p class="footer-text">Powered by Elixa AI Engine</p>
</div>

<script>
  const btn = document.getElementById('generate');
  const promptEl = document.getElementById('prompt');
  const videoEl = document.getElementById('resultVideo');
  const loadingEl = document.getElementById('loading');

  btn.addEventListener('click', async () => {
    const prompt = promptEl.value.trim();
    if (!prompt) return alert("Tafadhali andika maelezo ya video!");

    loadingEl.innerHTML = 'Subiri kidogo, Elixa inatengeneza video yako... ⏳';
    videoEl.style.display = "none";

    try {
      const res = await fetch("/generate-video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      if (data.success) {
        videoEl.src = data.video;
        videoEl.style.display = "block";
        loadingEl.innerHTML = "✅ Video imekamilika!";
      } else {
        loadingEl.textContent = "❌ Hitilafu imetokea.";
      }
    } catch (err) {
      loadingEl.textContent = "❌ Imeshindwa kuunganisha kwenye seva.";
    }
  });
</script>

</body>
</html>
